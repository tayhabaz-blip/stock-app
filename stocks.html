<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StockIQ — אנליזר מניות</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', system-ui, sans-serif; background: #ffffff; color: #1a1a1a; min-height: 100vh; }
  nav { display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; border-bottom: 1px solid #f0f0f0; position: sticky; top: 0; background: #fff; z-index: 100; }
  .logo { font-size: 18px; font-weight: 600; color: #00c805; letter-spacing: -0.5px; cursor: pointer; }
  .logo span { color: #1a1a1a; }
  .nav-actions { display: flex; align-items: center; gap: 10px; }
  .nav-btn { font-size: 13px; padding: 6px 16px; border-radius: 8px; border: 1.5px solid #e8e8e8; background: #fff; cursor: pointer; font-family: inherit; color: #555; }
  .nav-btn:hover { border-color: #00c805; color: #00c805; }
  .nav-btn.active { background: #00c805; color: #fff; border-color: #00c805; }
  main { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem; }
  .search-wrap { margin-bottom: 2rem; }
  .search-label { font-size: 13px; color: #888; margin-bottom: 8px; }
  .search-bar { display: flex; gap: 10px; }
  .search-bar input { flex: 1; font-size: 16px; font-family: inherit; padding: 12px 16px; border-radius: 12px; border: 1.5px solid #e8e8e8; outline: none; transition: border 0.2s; text-transform: uppercase; letter-spacing: 0.05em; background: #fafafa; }
  .search-bar input:focus { border-color: #00c805; background: #fff; }
  .search-bar button { padding: 12px 24px; border-radius: 12px; border: none; background: #00c805; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .chips { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
  .chip { font-size: 12px; font-weight: 500; padding: 5px 14px; border-radius: 999px; border: 1.5px solid #e8e8e8; cursor: pointer; color: #555; background: #fff; font-family: inherit; }
  .chip:hover { border-color: #00c805; color: #00c805; }
  .scanner-header { margin-bottom: 1.5rem; }
  .scanner-title { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .scanner-sub { font-size: 13px; color: #888; }
  .scan-btn { margin-top: 12px; padding: 10px 24px; border-radius: 10px; border: none; background: #00c805; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .scan-btn:hover { opacity: 0.88; }
  .scan-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
  .scan-card { border: 1.5px solid #f0f0f0; border-radius: 14px; padding: 1.25rem; cursor: pointer; transition: all 0.15s; }
  .scan-card:hover { border-color: #00c805; box-shadow: 0 2px 12px rgba(0,200,5,0.08); }
  .scan-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .scan-ticker { font-size: 18px; font-weight: 600; }
  .scan-price { font-size: 16px; font-weight: 500; }
  .scan-rsi { font-size: 12px; color: #888; margin-bottom: 8px; }
  .scan-signals { display: flex; flex-wrap: wrap; gap: 6px; }
  .scan-signal { font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 999px; }
  .sig-green { background: #dcfce7; color: #15803d; }
  .sig-red { background: #fee2e2; color: #b91c1c; }
  .sig-blue { background: #dbeafe; color: #1d4ed8; }
  .sig-yellow { background: #fef9c3; color: #854d0e; }
  .company-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid #f0f0f0; }
  .company-name { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
  .company-ticker { font-size: 13px; color: #aaa; margin-bottom: 8px; }
  .company-tags { display: flex; gap: 8px; flex-wrap: wrap; }
  .tag { font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 999px; background: #f5f5f5; color: #555; }
  .company-price-value { font-size: 28px; font-weight: 600; text-align: left; }
  .company-price-change { font-size: 14px; font-weight: 500; margin-top: 4px; text-align: left; }
  .company-desc { background: #fafafa; border-radius: 14px; padding: 1.25rem; margin-bottom: 1.5rem; font-size: 13px; color: #555; line-height: 1.7; border: 1.5px solid #f0f0f0; }
  .company-desc-title { font-size: 11px; font-weight: 600; color: #aaa; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
  .desc-text { display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
  .desc-text.expanded { -webkit-line-clamp: unset; }
  .read-more { font-size: 12px; color: #00c805; cursor: pointer; margin-top: 6px; display: inline-block; font-weight: 500; }
  .fundamentals { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
  .fund-card { padding: 1rem; border-radius: 12px; border: 1.5px solid #f0f0f0; background: #fafafa; }
  .fund-label { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; }
  .fund-value { font-size: 16px; font-weight: 600; color: #1a1a1a; }
  .signal-banner { display: flex; align-items: center; gap: 14px; padding: 1.25rem 1.5rem; border-radius: 16px; margin-bottom: 1.5rem; }
  .signal-banner.green { background: #f0fdf0; border: 1.5px solid #bbf7bb; }
  .signal-banner.yellow { background: #fffbeb; border: 1.5px solid #fde68a; }
  .signal-banner.red { background: #fff1f1; border: 1.5px solid #fecaca; }
  .signal-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .dot-green { background: #00c805; }
  .dot-yellow { background: #f59e0b; }
  .dot-red { background: #ef4444; }
  .signal-title { font-size: 15px; font-weight: 600; }
  .signal-title.green { color: #15803d; }
  .signal-title.yellow { color: #92400e; }
  .signal-title.red { color: #b91c1c; }
  .signal-reasons { font-size: 12px; color: #888; margin-top: 3px; }
  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 1.5rem; }
  .metric { padding: 1.25rem; border-radius: 14px; border: 1.5px solid #f0f0f0; background: #fafafa; }
  .metric-label { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
  .metric-value { font-size: 20px; font-weight: 600; color: #1a1a1a; line-height: 1; }
  .metric-sub { font-size: 12px; color: #aaa; margin-top: 5px; }
  .up { color: #00c805; }
  .down { color: #ef4444; }
  .chart-card { border: 1.5px solid #f0f0f0; border-radius: 16px; padding: 1.5rem; margin-bottom: 1.25rem; }
  .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
  .chart-header-title { font-size: 13px; font-weight: 600; }
  .legend { display: flex; gap: 14px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #888; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
  .zone-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; border-radius: 10px; margin-bottom: 8px; }
  .zone-row.support { background: #f0fdf4; }
  .zone-row.resist { background: #fff1f2; }
  .zone-label { font-size: 13px; color: #555; }
  .zone-right { display: flex; align-items: center; gap: 10px; }
  .zone-badge { font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 999px; }
  .badge-support { background: #dcfce7; color: #15803d; }
  .badge-resist { background: #fee2e2; color: #b91c1c; }
  .zone-price { font-size: 14px; font-weight: 600; }
  .empty { text-align: center; padding: 5rem 0; }
  .empty-icon { font-size: 48px; margin-bottom: 1rem; }
  .empty-title { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
  .empty-sub { font-size: 14px; color: #aaa; }
  .loading-state { text-align: center; padding: 4rem 0; color: #aaa; font-size: 14px; }
  .error-state { text-align: center; padding: 2rem; background: #fff1f1; border-radius: 14px; color: #b91c1c; font-size: 14px; }
  .section-title { font-size: 11px; font-weight: 600; color: #aaa; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }
  .divider { height: 1px; background: #f0f0f0; margin: 1.5rem 0; }

  /* AI ANALYSIS CARD */
  .ai-card {
    border-radius: 16px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
    background: linear-gradient(135deg, #f0fdf4 0%, #f0f7ff 100%);
    border: 1.5px solid #d1fae5;
    position: relative;
    overflow: hidden;
  }
  .ai-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, #00c805, #3b82f6);
  }
  .ai-card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 1rem;
  }
  .ai-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 999px;
    background: linear-gradient(135deg, #00c805, #3b82f6);
    color: #fff;
    letter-spacing: 0.05em;
  }
  .ai-card-title {
    font-size: 13px;
    font-weight: 600;
    color: #1a1a1a;
  }
  .ai-text {
    font-size: 14px;
    line-height: 1.8;
    color: #374151;
    white-space: pre-line;
  }
  .ai-loading {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: #888;
  }
  .ai-spinner {
    width: 16px; height: 16px;
    border: 2px solid #e8e8e8;
    border-top-color: #00c805;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* BULL/BEAR METER */
  .sentiment-card {
    border: 1.5px solid #f0f0f0;
    border-radius: 16px;
    padding: 1.5rem;
    margin-bottom: 1.25rem;
    background: #fafafa;
  }
  .sentiment-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.25rem;
  }
  .sentiment-title { font-size: 13px; font-weight: 600; }
  .sentiment-analysts { font-size: 12px; color: #aaa; }
  .sentiment-bar-wrap {
    display: flex;
    border-radius: 8px;
    overflow: hidden;
    height: 28px;
    margin-bottom: 12px;
  }
  .sentiment-bar-bull {
    background: #00c805;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; color: #fff;
    transition: width 0.6s ease;
    min-width: 32px;
  }
  .sentiment-bar-neutral {
    background: #e5e7eb;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 500; color: #888;
    transition: width 0.6s ease;
  }
  .sentiment-bar-bear {
    background: #ef4444;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; color: #fff;
    transition: width 0.6s ease;
    min-width: 32px;
  }
  .sentiment-labels {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: #555;
    margin-bottom: 1rem;
  }
  .sentiment-label-bull { color: #15803d; font-weight: 600; display: flex; align-items: center; gap: 5px; }
  .sentiment-label-bear { color: #b91c1c; font-weight: 600; display: flex; align-items: center; gap: 5px; }
  .sentiment-label-neutral { color: #888; }
  .sentiment-votes {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .vote-chip {
    font-size: 11px;
    font-weight: 500;
    padding: 4px 12px;
    border-radius: 999px;
    border: 1.5px solid #f0f0f0;
    background: #fff;
    color: #555;
  }
  .short-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-top: 1px solid #f0f0f0;
    margin-top: 1rem;
    font-size: 13px;
  }
  .short-label { color: #888; }
  .short-val { font-weight: 600; color: #ef4444; }
</style>
</head>
<body>
<nav>
  <div class="logo" onclick="showHome()">Stock<span>IQ</span></div>
  <div class="nav-actions">
    <button class="nav-btn active" id="btnAnalyze" onclick="showHome()">ניתוח מניה</button>
    <button class="nav-btn" id="btnScan" onclick="showScanner()">🔍 סקור בוקר</button>
  </div>
</nav>

<main id="main">
  <div id="homePage">
    <div class="search-wrap">
      <div class="search-label">חפש מניה לניתוח</div>
      <div class="search-bar">
        <input type="text" id="ticker" placeholder="הכנס טיקר... AAPL, TSLA, CIFR" />
        <button onclick="analyze()">נתח ←</button>
      </div>
      <div class="chips">
        <span class="chip" onclick="load('AAPL')">AAPL</span>
        <span class="chip" onclick="load('TSLA')">TSLA</span>
        <span class="chip" onclick="load('NVDA')">NVDA</span>
        <span class="chip" onclick="load('CIFR')">CIFR</span>
        <span class="chip" onclick="load('TEVA')">TEVA</span>
        <span class="chip" onclick="load('MSFT')">MSFT</span>
        <span class="chip" onclick="load('META')">META</span>
        <span class="chip" onclick="load('SOFI')">SOFI</span>
      </div>
    </div>
    <div id="results">
      <div class="empty">
        <div class="empty-icon">📈</div>
        <div class="empty-title">ברוך הבא ל-StockIQ</div>
        <div class="empty-sub">חפש מניה לניתוח טכני מלא, או עבור לסקור הבוקר</div>
      </div>
    </div>
  </div>

  <div id="scanPage" style="display:none">
    <div class="scanner-header">
      <div class="scanner-title">🔍 סקור בוקר</div>
      <div class="scanner-sub">סריקה אוטומטית של מניות עם איתותים טכניים מעניינים</div>
      <button class="scan-btn" onclick="runScan()">הרץ סריקה</button>
    </div>
    <div id="scanResults">
      <div class="empty">
        <div class="empty-icon">🔍</div>
        <div class="empty-title">לחץ "הרץ סריקה"</div>
        <div class="empty-sub">הסריקה תבדוק 28 מניות ותמצא הזדמנויות</div>
      </div>
    </div>
  </div>
</main>

<script>
let pc=null, rc=null;
const API='https://stock-app-1-dbrs.onrender.com';

const SECTORS={
  'Technology':'טכנולוגיה','Financial Services':'שירותים פיננסיים','Healthcare':'בריאות',
  'Consumer Cyclical':'צריכה מחזורית','Consumer Defensive':'צריכה בסיסית','Industrials':'תעשייה',
  'Energy':'אנרגיה','Basic Materials':'חומרי גלם','Real Estate':'נדל"ן',
  'Communication Services':'תקשורת','Utilities':'תשתיות','Biotechnology':'ביוטכנולוגיה',
  'Pharmaceuticals':'תרופות','Software':'תוכנה','Semiconductors':'מוליכים למחצה',
};

function translateSector(s){return SECTORS[s]||s;}
function fmt(n){if(!n)return'—';if(n>1e12)return'$'+(n/1e12).toFixed(2)+'T';if(n>1e9)return'$'+(n/1e9).toFixed(2)+'B';if(n>1e6)return'$'+(n/1e6).toFixed(2)+'M';return'$'+n.toFixed(0);}
function load(t){document.getElementById('ticker').value=t;analyze();}

function showHome(){
  document.getElementById('homePage').style.display='block';
  document.getElementById('scanPage').style.display='none';
  document.getElementById('btnAnalyze').classList.add('active');
  document.getElementById('btnScan').classList.remove('active');
}
function showScanner(){
  document.getElementById('homePage').style.display='none';
  document.getElementById('scanPage').style.display='block';
  document.getElementById('btnScan').classList.add('active');
  document.getElementById('btnAnalyze').classList.remove('active');
}

function getSigClass(s){
  if(s.includes('RSI נמוך')) return 'sig-green';
  if(s.includes('RSI גבוה')) return 'sig-red';
  if(s.includes('תמיכה')) return 'sig-green';
  if(s.includes('התנגדות')) return 'sig-yellow';
  return 'sig-blue';
}

async function runScan(){
  document.getElementById('scanResults').innerHTML='<div class="loading-state">סורק 28 מניות... זה עשוי לקחת כ-30 שניות</div>';
  try{
    const res=await fetch(API+'/scan');
    const json=await res.json();
    const results=json.results;
    if(!results||results.length===0){
      document.getElementById('scanResults').innerHTML='<div class="empty"><div class="empty-icon">😴</div><div class="empty-title">אין איתותים מעניינים כרגע</div></div>';
      return;
    }
    document.getElementById('scanResults').innerHTML=`
      <div style="font-size:13px;color:#888;margin-bottom:1rem">נמצאו ${results.length} מניות עם איתותים מעניינים</div>
      <div class="scan-grid">
        ${results.map(r=>`
          <div class="scan-card" onclick="loadFromScan('${r.ticker}')">
            <div class="scan-card-top">
              <div class="scan-ticker">${r.ticker}</div>
              <div class="scan-price">$${r.price}</div>
            </div>
            <div class="scan-rsi">RSI: ${r.rsi}</div>
            <div class="scan-signals">
              ${r.signals.map(s=>`<span class="scan-signal ${getSigClass(s)}">${s}</span>`).join('')}
            </div>
          </div>
        `).join('')}
      </div>
    `;
  }catch(e){
    document.getElementById('scanResults').innerHTML='<div class="error-state">שגיאה בסריקה — ודא שה-backend רץ</div>';
  }
}

function loadFromScan(ticker){
  document.getElementById('ticker').value=ticker;
  showHome();
  analyze();
}

function ma(d,p){return d.map((_,i)=>{if(i<p-1)return null;const s=d.slice(i-p+1,i+1).filter(v=>v!==null);if(s.length<p)return null;return parseFloat((s.reduce((a,b)=>a+b,0)/s.length).toFixed(2));});}
function rsi(d,p=14){const r=d.map(()=>null);for(let i=p;i<d.length;i++){let g=0,l=0;for(let j=i-p+1;j<=i;j++){const x=d[j]-d[j-1];if(x>0)g+=x;else l-=x;}r[i]=parseFloat((100-100/(1+g/(l||0.0001))).toFixed(1));}return r;}

// תמיכה/התנגדות משופרת — Pivot Points + אזורי צפיפות
function zones(closes, highs, lows) {
  if (!highs || !lows || highs.length < 5) {
    // fallback לשיטה הישנה
    const s=[...closes.filter(v=>v!==null).slice(-60)].sort((a,b)=>a-b);
    return[
      {p:parseFloat(s[Math.floor(s.length*.12)].toFixed(2)),t:'תמיכה',str:'חזקה'},
      {p:parseFloat(s[Math.floor(s.length*.30)].toFixed(2)),t:'תמיכה',str:'בינונית'},
      {p:parseFloat(s[Math.floor(s.length*.70)].toFixed(2)),t:'התנגדות',str:'בינונית'},
      {p:parseFloat(s[Math.floor(s.length*.88)].toFixed(2)),t:'התנגדות',str:'חזקה'}
    ];
  }

  const price = closes[closes.length-1];
  const results = [];

  // שיטה 1: Pivot Points קלאסיים (5 ימים אחרונים)
  const pivotZones = [];
  for (let i = closes.length - 5; i < closes.length - 1; i++) {
    const h = highs[i], l = lows[i], c = closes[i];
    const pivot = (h + l + c) / 3;
    pivotZones.push({
      r1: 2*pivot - l,
      r2: pivot + (h - l),
      s1: 2*pivot - h,
      s2: pivot - (h - l),
    });
  }
  // ממוצע ה-Pivot Points
  const avgS1 = pivotZones.reduce((a,z)=>a+z.s1,0)/pivotZones.length;
  const avgS2 = pivotZones.reduce((a,z)=>a+z.s2,0)/pivotZones.length;
  const avgR1 = pivotZones.reduce((a,z)=>a+z.r1,0)/pivotZones.length;
  const avgR2 = pivotZones.reduce((a,z)=>a+z.r2,0)/pivotZones.length;

  // שיטה 2: Low/High חשובים של 90 ימים
  const recentLows = lows.slice(-90).filter(v=>v!=null);
  const recentHighs = highs.slice(-90).filter(v=>v!=null);
  const sorted52wLow = [...recentLows].sort((a,b)=>a-b);
  const sorted52wHigh = [...recentHighs].sort((a,b)=>b-a);
  const structuralSupport = sorted52wLow[Math.floor(sorted52wLow.length*0.1)];
  const structuralResist  = sorted52wHigh[Math.floor(sorted52wHigh.length*0.1)];

  // בוחר הכי רלוונטי מתחת ומעל למחיר הנוכחי
  const supports = [avgS1, avgS2, structuralSupport].filter(v=>v!=null&&v<price).sort((a,b)=>b-a);
  const resists  = [avgR1, avgR2, structuralResist].filter(v=>v!=null&&v>price).sort((a,b)=>a-b);

  if(supports[0]) results.push({p:parseFloat(supports[0].toFixed(2)),t:'תמיכה',str:'קרובה'});
  if(supports[1]) results.push({p:parseFloat(supports[1].toFixed(2)),t:'תמיכה',str:'חזקה'});
  if(resists[0])  results.push({p:parseFloat(resists[0].toFixed(2)),t:'התנגדות',str:'קרובה'});
  if(resists[1])  results.push({p:parseFloat(resists[1].toFixed(2)),t:'התנגדות',str:'חזקה'});

  // אם חסרות — fallback
  if(results.length < 4) {
    const s=[...closes.filter(v=>v!==null).slice(-60)].sort((a,b)=>a-b);
    if(results.length<2) results.unshift({p:parseFloat(s[Math.floor(s.length*.12)].toFixed(2)),t:'תמיכה',str:'חזקה'});
    if(results.length<4) results.push({p:parseFloat(s[Math.floor(s.length*.88)].toFixed(2)),t:'התנגדות',str:'חזקה'});
  }

  return results.slice(0,4);
}

function signal(price,m9,m20,m150,m200,rv,zs){
  let sc=0,rs=[];
  if(m200){if(price>m200){sc++;rs.push('מעל MA200');}else{sc--;rs.push('מתחת MA200');}}
  if(m150){if(price>m150){sc++;rs.push('מעל MA150');}else{sc--;rs.push('מתחת MA150');}}
  if(m9&&m20){if(m9>m20){sc++;rs.push('MA9 מעל MA20');}else{sc--;rs.push('MA9 מתחת MA20');}}
  if(rv!==null){if(rv<35){sc+=2;rs.push('RSI נמוך ('+rv+')');}else if(rv>70){sc-=2;rs.push('RSI גבוה ('+rv+')');}else rs.push('RSI ניטרלי ('+rv+')');}
  if(zs.find(z=>z.t==='תמיכה'&&Math.abs(price-z.p)/price<0.03)){sc++;rs.push('קרוב לתמיכה');}
  if(zs.find(z=>z.t==='התנגדות'&&Math.abs(price-z.p)/price<0.03)){sc--;rs.push('קרוב להתנגדות');}
  if(sc>=2)return{c:'green',l:'פוטנציאל קנייה',rs};
  if(sc<=-1)return{c:'red',l:'זהירות — חולשה',rs};
  return{c:'yellow',l:'תמונה מעורבת',rs};
}

function toggleDesc(){
  const el=document.getElementById('descText');
  const btn=document.getElementById('readMore');
  if(el.classList.contains('expanded')){el.classList.remove('expanded');btn.textContent='קרא עוד ↓';}
  else{el.classList.add('expanded');btn.textContent='פחות ↑';}
}

// ===== SENTIMENT CARD =====
async function fetchAndRenderSentiment(ticker) {
  const card = document.getElementById('sentimentCard');
  if (!card) return;
  try {
    const res = await fetch(API + '/sentiment/' + ticker);
    const d = await res.json();
    if (d.error) { card.style.display='none'; return; }

    const bull = d.bull_pct || 0;
    const bear = d.bear_pct || 0;
    const neutral = d.neutral_pct || 0;
    const total = d.votes?.total || 0;

    card.innerHTML = `
      <div class="sentiment-header">
        <div class="sentiment-title">🐂 שורים / 🐻 דובים</div>
        <div class="sentiment-analysts">${total} אנליסטים</div>
      </div>
      <div class="sentiment-bar-wrap">
        <div class="sentiment-bar-bull" style="width:${bull}%">${bull > 8 ? bull+'%' : ''}</div>
        <div class="sentiment-bar-neutral" style="width:${neutral}%">${neutral > 8 ? neutral+'%' : ''}</div>
        <div class="sentiment-bar-bear" style="width:${bear}%">${bear > 8 ? bear+'%' : ''}</div>
      </div>
      <div class="sentiment-labels">
        <span class="sentiment-label-bull">🐂 שורים ${bull}%</span>
        <span class="sentiment-label-neutral">Hold ${neutral}%</span>
        <span class="sentiment-label-bear">${bear}% דובים 🐻</span>
      </div>
      <div class="sentiment-votes">
        <span class="vote-chip">💪 Strong Buy: ${d.votes?.strong_buy || 0}</span>
        <span class="vote-chip">✅ Buy: ${d.votes?.buy || 0}</span>
        <span class="vote-chip">⏸ Hold: ${d.votes?.hold || 0}</span>
        <span class="vote-chip">⚠️ Sell: ${d.votes?.sell || 0}</span>
        <span class="vote-chip">🚨 Strong Sell: ${d.votes?.strong_sell || 0}</span>
      </div>
      ${d.short_pct_float ? `
      <div class="short-row">
        <span class="short-label">אחוז שורט (Float)</span>
        <span class="short-val">${d.short_pct_float}%</span>
      </div>` : ''}
    `;
  } catch(e) {
    card.style.display = 'none';
  }
}

async function analyze(){
  const t=document.getElementById('ticker').value.trim().toUpperCase();
  if(!t)return;
  if(pc){pc.destroy();pc=null;}if(rc){rc.destroy();rc=null;}
  document.getElementById('results').innerHTML='<div class="loading-state">טוען נתונים עבור '+t+'...</div>';
  try{
    const res=await fetch(API+'/stock/'+t);
    const json=await res.json();
    if(json.error)throw new Error(json.error);

    const d=json.closes, lb=json.labels;
    const highs=json.highs||null, lows=json.lows||null;
    const m9=ma(d,9),m20=ma(d,20),m150=ma(d,150),m200=ma(d,200),rv=rsi(d);
    const zs=zones(d, highs, lows);
    const price=d[d.length-1],prev=d[d.length-2];
    const ch=((price-prev)/prev*100).toFixed(2);
    const rv_=rv.filter(v=>v!==null).pop();
    const lm9=m9.filter(v=>v!==null).pop(),lm20=m20.filter(v=>v!==null).pop();
    const lm150=m150.filter(v=>v!==null).pop(),lm200=m200.filter(v=>v!==null).pop();
    const sg=signal(price,lm9,lm20,lm150,lm200,rv_,zs);
    const isUp=parseFloat(ch)>=0;
    const gc='rgba(0,0,0,0.05)',tc='rgba(0,0,0,0.3)';

    document.getElementById('results').innerHTML=`
      <div class="company-header">
        <div>
          <div class="company-name">${json.name||t}</div>
          <div class="company-ticker">${t} ${json.country?'· '+json.country:''}</div>
          <div class="company-tags">
            ${json.sector?'<span class="tag">'+translateSector(json.sector)+'</span>':''}

      </div>

      ${json.description?`<div class="company-desc"><div class="company-desc-title">על החברה</div><div class="desc-text" id="descText">${json.description}</div><span class="read-more" id="readMore" onclick="toggleDesc()">קרא עוד ↓</span></div>`:''}

      <div class="fundamentals">
        <div class="fund-card"><div class="fund-label">שווי שוק</div><div class="fund-value">${fmt(json.market_cap)}</div></div>
        <div class="fund-card"><div class="fund-label">P/E Ratio</div><div class="fund-value">${json.pe_ratio?json.pe_ratio.toFixed(1):'—'}</div></div>
        <div class="fund-card"><div class="fund-label">EPS</div><div class="fund-value">${json.eps?'$'+json.eps.toFixed(2):'—'}</div></div>
        <div class="fund-card"><div class="fund-label">52W גבוה</div><div class="fund-value">${json.week_high?'$'+json.week_high.toFixed(2):'—'}</div></div>
        <div class="fund-card"><div class="fund-label">52W נמוך</div><div class="fund-value">${json.week_low?'$'+json.week_low.toFixed(2):'—'}</div></div>
        <div class="fund-card"><div class="fund-label">דיבידנד</div><div class="fund-value">${json.dividend?(json.dividend*100).toFixed(2)+'%':'—'}</div></div>
      </div>

      <div class="divider"></div>

      <!-- AI ANALYSIS -->
      <div class="ai-card" id="aiCard">
        <div class="ai-card-header">
          <span class="ai-badge">AI</span>
          <span class="ai-card-title">ניתוח חכם — ${t}</span>
        </div>
        <div id="aiText" class="ai-loading">

        </div>
      </div>

      <div class="signal-banner ${sg.c}">
        <div class="signal-dot dot-${sg.c}"></div>

          <div class="signal-title ${sg.c}">ניתוח טכני — ${sg.l}</div>
