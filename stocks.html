<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StockIQ — אנליזר מניות</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',sans-serif;background:#0d0520;color:#fff;min-height:100vh;overflow-x:hidden}
  body::before{content:'';position:fixed;top:-100px;right:-100px;width:500px;height:500px;background:rgba(139,92,246,0.12);border-radius:50%;pointer-events:none}
  nav{display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;height:60px;background:rgba(255,255,255,0.03);border-bottom:1px solid rgba(255,255,255,0.08);position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
  .logo{font-size:18px;font-weight:700;color:#a78bfa;cursor:pointer}.logo span{color:#fff}
  .nav-actions{display:flex;gap:8px}
  .nav-btn{font-size:12px;padding:6px 14px;border-radius:8px;border:1px solid rgba(255,255,255,0.12);background:transparent;cursor:pointer;font-family:inherit;color:rgba(255,255,255,0.5);transition:all 0.2s}
  .nav-btn:hover,.nav-btn.active{background:rgba(139,92,246,0.2);color:#a78bfa;border-color:rgba(139,92,246,0.4)}
  main{max-width:960px;margin:0 auto;padding:2rem 1.5rem}
  .glass{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.09);border-radius:16px;backdrop-filter:blur(10px)}
  .search-bar{display:flex;gap:10px;background:rgba(255,255,255,0.05);border:1px solid rgba(139,92,246,0.3);border-radius:14px;padding:6px 6px 6px 16px}
  .search-bar input{flex:1;font-size:15px;font-family:inherit;background:transparent;border:none;outline:none;color:#fff;text-transform:uppercase}
  .search-bar input::placeholder{color:rgba(255,255,255,0.25);text-transform:none}
  .search-bar button{padding:10px 22px;border-radius:10px;border:none;background:linear-gradient(135deg,#7c3aed,#a78bfa);color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
  .home-hero{text-align:center;padding:3rem 0 2rem}
  .home-hero h1{font-size:36px;font-weight:700;background:linear-gradient(135deg,#a78bfa,#c4b5fd,#fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}
  .home-hero p{font-size:15px;color:rgba(255,255,255,0.4);margin-bottom:2rem}
  .news-title{font-size:11px;font-weight:600;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:12px}
  .news-card{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;cursor:pointer;transition:background 0.15s}
  .news-card:hover{background:rgba(255,255,255,0.03)}
  .news-dot{width:6px;height:6px;border-radius:50%;background:#a78bfa;flex-shrink:0;margin-top:6px}
  .news-card-title{font-size:13px;color:rgba(255,255,255,0.8);line-height:1.5;margin-bottom:3px}
  .news-card-meta{font-size:11px;color:rgba(255,255,255,0.3)}
  .loading-state{text-align:center;padding:2rem;color:rgba(255,255,255,0.3);font-size:14px}
  .empty{text-align:center;padding:4rem 0}
  .empty-icon{font-size:48px;margin-bottom:1rem}
  .empty-title{font-size:20px;font-weight:600;margin-bottom:8px}
  .empty-sub{font-size:14px;color:rgba(255,255,255,0.3)}
  .back-btn{font-size:13px;color:rgba(255,255,255,0.4);cursor:pointer;margin-bottom:1.5rem;display:inline-flex;align-items:center;gap:4px}
  .back-btn:hover{color:#a78bfa}
  .company-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.5rem;padding-bottom:1.5rem;border-bottom:1px solid rgba(255,255,255,0.08)}
  .company-name{font-size:22px;font-weight:700;margin-bottom:4px}
  .company-ticker{font-size:13px;color:rgba(255,255,255,0.4);margin-bottom:8px}
  .company-tags{display:flex;gap:8px;flex-wrap:wrap}
  .tag{font-size:11px;font-weight:500;padding:3px 10px;border-radius:999px;background:rgba(139,92,246,0.15);color:#c4b5fd;border:1px solid rgba(139,92,246,0.2)}
  .company-price-value{font-size:28px;font-weight:700;text-align:left}
  .company-price-change{font-size:14px;font-weight:500;margin-top:4px;text-align:left}
  .up{color:#4ade80}.down{color:#f87171}
  .fundamentals{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:1.5rem}
  .fund-card{padding:1rem;border-radius:12px}
  .fund-label{font-size:11px;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:6px}
  .fund-value{font-size:16px;font-weight:600;color:#fff}
  .metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:1.5rem}
  .metric{padding:1.25rem;border-radius:14px}
  .metric-label{font-size:11px;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px}
  .metric-value{font-size:20px;font-weight:600;color:#fff;line-height:1}
  .metric-sub{font-size:12px;color:rgba(255,255,255,0.3);margin-top:5px}
  .signal-banner{display:flex;align-items:center;gap:14px;padding:1.25rem 1.5rem;border-radius:16px;margin-bottom:1.5rem}
  .signal-banner.green{background:rgba(74,222,128,0.08);border:1px solid rgba(74,222,128,0.2)}
  .signal-banner.yellow{background:rgba(251,191,36,0.08);border:1px solid rgba(251,191,36,0.2)}
  .signal-banner.red{background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.2)}
  .signal-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  .dot-green{background:#4ade80}.dot-yellow{background:#fbbf24}.dot-red{background:#f87171}
  .signal-title{font-size:14px;font-weight:600}
  .signal-title.green{color:#4ade80}.signal-title.yellow{color:#fbbf24}.signal-title.red{color:#f87171}
  .signal-reasons{font-size:12px;color:rgba(255,255,255,0.4);margin-top:3px}
  .ai-card{border-radius:16px;padding:1.5rem;margin-bottom:1.5rem;position:relative;overflow:hidden;background:rgba(139,92,246,0.07);border:1px solid rgba(139,92,246,0.2)}
  .ai-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#7c3aed,#a78bfa)}
  .ai-badge{font-size:10px;font-weight:600;padding:3px 10px;border-radius:999px;background:linear-gradient(135deg,#7c3aed,#a78bfa);color:#fff}
  .ai-card-header{display:flex;align-items:center;gap:10px;margin-bottom:1rem}
  .ai-card-title{font-size:13px;font-weight:600;color:rgba(255,255,255,0.7)}
  .ai-text{font-size:13px;line-height:1.8;color:rgba(255,255,255,0.7);white-space:pre-line}
  .ai-loading{display:flex;align-items:center;gap:10px;font-size:13px;color:rgba(255,255,255,0.4)}
  .ai-spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,0.1);border-top-color:#a78bfa;border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0}
  @keyframes spin{to{transform:rotate(360deg)}}
  .sentiment-card{border-radius:16px;padding:1.5rem;margin-bottom:1.25rem}
  .sentiment-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem}
  .sentiment-title{font-size:13px;font-weight:600;color:rgba(255,255,255,0.7)}
  .sentiment-analysts{font-size:12px;color:rgba(255,255,255,0.3)}
  .sentiment-bar-wrap{display:flex;border-radius:6px;overflow:hidden;height:24px;margin-bottom:10px}
  .sentiment-bar-bull{background:#4ade80;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#052e16}
  .sentiment-bar-neutral{background:rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;font-size:11px;color:rgba(255,255,255,0.4)}
  .sentiment-bar-bear{background:#f87171;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#450a0a}
  .sentiment-labels{display:flex;justify-content:space-between;font-size:11px;margin-bottom:1rem}
  .sentiment-label-bull{color:#4ade80;font-weight:600}
  .sentiment-label-bear{color:#f87171;font-weight:600}
  .sentiment-label-neutral{color:rgba(255,255,255,0.3)}
  .sentiment-votes{display:flex;gap:8px;flex-wrap:wrap}
  .vote-chip{font-size:11px;font-weight:500;padding:4px 12px;border-radius:999px;border:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.5)}
  .short-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-top:1px solid rgba(255,255,255,0.06);margin-top:1rem;font-size:13px}
  .short-label{color:rgba(255,255,255,0.4)}.short-val{font-weight:600;color:#f87171}
  .chart-card{border-radius:16px;padding:1.5rem;margin-bottom:1.25rem}
  .chart-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
  .chart-header-title{font-size:13px;font-weight:600;color:rgba(255,255,255,0.7)}
  .zone-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-radius:10px;margin-bottom:8px}
  .zone-row.support{background:rgba(74,222,128,0.06);border:1px solid rgba(74,222,128,0.12)}
  .zone-row.resist{background:rgba(248,113,113,0.06);border:1px solid rgba(248,113,113,0.12)}
  .zone-label{font-size:13px;color:rgba(255,255,255,0.6)}
  .zone-price{font-size:14px;font-weight:600}
  .zone-badge{font-size:11px;font-weight:500;padding:3px 10px;border-radius:999px}
  .badge-support{background:rgba(74,222,128,0.15);color:#4ade80}
  .badge-resist{background:rgba(248,113,113,0.15);color:#f87171}
  .section-title{font-size:11px;font-weight:600;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px}
  .divider{height:1px;background:rgba(255,255,255,0.06);margin:1.5rem 0}
  .error-state{text-align:center;padding:2rem;background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.2);border-radius:14px;color:#f87171;font-size:14px}
  .watchlist-empty{text-align:center;padding:3rem 0;color:rgba(255,255,255,0.3)}
  .watchlist-item{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;cursor:pointer;transition:background 0.15s;border-bottom:1px solid rgba(255,255,255,0.05)}
  .watchlist-item:last-child{border-bottom:none}
  .watchlist-item:hover{background:rgba(255,255,255,0.03)}
  .wl-ticker{font-size:15px;font-weight:600}
  .wl-remove{font-size:18px;color:rgba(255,255,255,0.2);cursor:pointer;padding:4px 8px}
  .wl-remove:hover{color:#f87171}
  .add-btn{width:100%;padding:12px;border-radius:10px;border:1px dashed rgba(139,92,246,0.3);background:transparent;color:rgba(139,92,246,0.7);font-size:13px;cursor:pointer;font-family:inherit;margin-top:12px}
  .scan-btn{padding:10px 24px;border-radius:10px;border:none;background:linear-gradient(135deg,#7c3aed,#a78bfa);color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:12px}
  .scan-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
  .scan-card{padding:1.25rem;cursor:pointer;transition:all 0.15s}
  .scan-card:hover{border-color:rgba(139,92,246,0.4)}
  .scan-ticker{font-size:18px;font-weight:600}
  .scan-rsi{font-size:12px;color:rgba(255,255,255,0.4);margin:6px 0}
  .scan-signals{display:flex;flex-wrap:wrap;gap:6px}
  .sig{font-size:11px;font-weight:500;padding:3px 10px;border-radius:999px}
  .sig-green{background:rgba(74,222,128,0.15);color:#4ade80;border:1px solid rgba(74,222,128,0.2)}
  .sig-red{background:rgba(248,113,113,0.15);color:#f87171;border:1px solid rgba(248,113,113,0.2)}
  .sig-blue{background:rgba(139,92,246,0.15);color:#a78bfa;border:1px solid rgba(139,92,246,0.2)}
</style>
</head>
<body>
<nav>
  <div class="logo" onclick="showHome()">Stock<span>IQ</span></div>
  <div class="nav-actions">
    <button class="nav-btn active" id="btnHome" onclick="showHome()">בית</button>
    <button class="nav-btn" id="btnAnalyze" onclick="showAnalyze()">ניתוח מניה</button>
    <button class="nav-btn" id="btnWatchlist" onclick="showWatchlist()">מעקב ⭐</button>
    <button class="nav-btn" id="btnScan" onclick="showScanner()">סריקת מניות 🔍</button>
  </div>
</nav>
<main id="main">
  <div id="homePage">
    <div class="home-hero">
      <h1>ניתוח מניות חכם</h1>
      <p>AI בעברית · נתוני אנליסטים · איתותים טכניים בזמן אמת</p>
      <div style="max-width:560px;margin:0 auto 2rem">
        <div class="search-bar">
          <input type="text" id="homeInput" placeholder="חפש מניה... AAPL, TSLA, SOFI" onkeydown="if(event.key==='Enter')loadHome()"/>
          <button onclick="loadHome()">נתח ←</button>
        </div>
      </div>
    </div>
    <div class="news-title">חדשות שוק</div>
    <div class="glass" id="newsBox"><div class="loading-state">טוען חדשות...</div></div>
  </div>
  <div id="analyzePage" style="display:none">
    <div style="margin-bottom:1.5rem">
      <div class="search-bar">
        <input type="text" id="ticker" placeholder="הכנס טיקר... AAPL, TSLA, SOFI" onkeydown="if(event.key==='Enter')analyze()"/>
        <button onclick="analyze()">נתח ←</button>
      </div>
    </div>
    <div id="results">
      <div class="empty"><div class="empty-icon">📈</div><div class="empty-title">חפש מניה לניתוח</div><div class="empty-sub">ניתוח טכני מלא עם AI בעברית</div></div>
    </div>
  </div>
  <div id="watchlistPage" style="display:none">
    <div style="font-size:20px;font-weight:600;margin-bottom:1.5rem">רשימת מעקב ⭐</div>
    <div class="glass" id="wlBox"></div>
  </div>
  <div id="scanPage" style="display:none">
    <div style="font-size:20px;font-weight:600;margin-bottom:8px">סריקת מניות 🔍</div>
    <div style="font-size:13px;color:rgba(255,255,255,0.4);margin-bottom:12px">זיהוי אוטומטי של מניות עם איתותים טכניים</div>
    <button class="scan-btn" onclick="runScan()">הרץ סריקה</button>
    <div id="scanResults" style="margin-top:1.5rem">
      <div class="empty"><div class="empty-icon">🔍</div><div class="empty-title">לחץ הרץ סריקה</div></div>
    </div>
  </div>
</main>
<script>
// ── כתובת הבקאנד — שנה כאן בלבד אם עוברים ל-ngrok ──
const API='https://stock-app-1-dbrs.onrender.com';
let pc=null,rc=null,currentTicker=null;

// ── NAV ──
function setPage(id){
  ['homePage','analyzePage','watchlistPage','scanPage'].forEach(p=>document.getElementById(p).style.display='none');
  document.getElementById(id).style.display='block';
  ['btnHome','btnAnalyze','btnWatchlist','btnScan'].forEach(b=>document.getElementById(b).classList.remove('active'));
}
function showHome(){setPage('homePage');document.getElementById('btnHome').classList.add('active');loadNews();}
function showAnalyze(){setPage('analyzePage');document.getElementById('btnAnalyze').classList.add('active');}
function showWatchlist(){setPage('watchlistPage');document.getElementById('btnWatchlist').classList.add('active');renderWL();}
function showScanner(){setPage('scanPage');document.getElementById('btnScan').classList.add('active');}
function loadHome(){const t=document.getElementById('homeInput').value.trim().toUpperCase();if(!t)return;showAnalyze();document.getElementById('ticker').value=t;analyze();}

// ── NEWS ──
async function translateLine(txt){
  try{const r=await fetch('https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=he&dt=t&q='+encodeURIComponent(txt));const d=await r.json();return d[0].map(x=>x[0]).join('');}catch(e){return txt;}
}
async function loadNews(){
  const box=document.getElementById('newsBox');
  box.innerHTML='<div class="loading-state">טוען חדשות...</div>';
  try{
    const res=await fetch(API+'/news');
    const data=await res.json();
    const items=(data.news||[]).slice(0,8);
    const translated=await Promise.all(items.map(n=>translateLine(n.headline)));
    box.innerHTML=items.map((n,i)=>{
      const diff=Math.floor((Date.now()-n.datetime*1000)/3600000);
      const t=diff<1?'לפני פחות משעה':diff<24?'לפני '+diff+' שעות':'לפני '+Math.floor(diff/24)+' ימים';
      return '<div class="news-card" onclick="window.open(\''+n.url+'\',\'_blank\')"><div class="news-dot"></div><div class="news-card-content"><div class="news-card-title">'+translated[i]+'</div><div class="news-card-meta">'+t+' · '+n.source+'</div></div></div>';
    }).join('');
  }catch(e){box.innerHTML='<div class="loading-state">לא ניתן לטעון חדשות</div>';}
}
setInterval(loadNews,5*60*1000);

// ── WATCHLIST ──
function getWL(){return JSON.parse(localStorage.getItem('wl')||'[]');}
function saveWL(l){localStorage.setItem('wl',JSON.stringify(l));}
function addWL(t){const l=getWL();if(!l.includes(t)){l.push(t);saveWL(l);}}
function removeWL(t){saveWL(getWL().filter(x=>x!==t));renderWL();}
function renderWL(){
  const l=getWL();const box=document.getElementById('wlBox');
  if(!l.length){box.innerHTML='<div class="watchlist-empty">⭐<div style="margin-top:8px">אין מניות ברשימה</div></div>';return;}
  box.innerHTML=l.map(t=>'<div class="watchlist-item" onclick="loadWL(\''+t+'\')"><div class="wl-ticker">'+t+'</div><span class="wl-remove" onclick="event.stopPropagation();removeWL(\''+t+'\')">×</span></div>').join('')+'<button class="add-btn" onclick="showAnalyze()">+ הוסף מניה</button>';
}
function loadWL(t){showAnalyze();document.getElementById('ticker').value=t;analyze();}

// ── SCANNER ──
async function runScan(){
  document.getElementById('scanResults').innerHTML='<div class="loading-state">סורק... עשוי לקחת 30 שניות</div>';
  try{
    const res=await fetch(API+'/scan');const d=await res.json();
    if(!d.results||!d.results.length){document.getElementById('scanResults').innerHTML='<div class="empty"><div class="empty-icon">😴</div><div class="empty-title">אין איתותים כרגע</div></div>';return;}
    document.getElementById('scanResults').innerHTML='<div class="scan-grid">'+d.results.map(r=>'<div class="glass scan-card" onclick="loadScan(\''+r.ticker+'\')"><div class="scan-ticker">'+r.ticker+'</div><div class="scan-rsi">RSI: '+r.rsi+' · $'+r.price+'</div><div class="scan-signals">'+r.signals.map(s=>'<span class="sig '+(s.includes('נמוך')?'sig-green':s.includes('גבוה')?'sig-red':'sig-blue')+'">'+s+'</span>').join('')+'</div></div>').join('')+'</div>';
  }catch(e){document.getElementById('scanResults').innerHTML='<div class="error-state">שגיאה בסריקה</div>';}
}
function loadScan(t){showAnalyze();document.getElementById('ticker').value=t;analyze();}

// ── MATH ──
function ma(d,p){return d.map((_,i)=>{if(i<p-1)return null;const s=d.slice(i-p+1,i+1).filter(v=>v!==null);if(s.length<p)return null;return parseFloat((s.reduce((a,b)=>a+b,0)/s.length).toFixed(2));});}
function rsi(d,p=14){const r=d.map(()=>null);for(let i=p;i<d.length;i++){let g=0,l=0;for(let j=i-p+1;j<=i;j++){const x=d[j]-d[j-1];if(x>0)g+=x;else l-=x;}r[i]=parseFloat((100-100/(1+g/(l||0.0001))).toFixed(1));}return r;}
function zones(closes,highs,lows){
  const closes_f=closes.filter(v=>v!==null);
  const price=closes_f[closes_f.length-1];
  const s=[...closes.filter(v=>v!==null).slice(-90)].sort((a,b)=>a-b);
  const h=[...((highs||[]).filter(v=>v!==null).slice(-90))].sort((a,b)=>b-a);
  return[
    {p:parseFloat((s[Math.floor(s.length*.1)]||s[0]||0).toFixed(2)),t:'תמיכה',str:'חזקה'},
    {p:parseFloat((s[Math.floor(s.length*.25)]||s[0]||0).toFixed(2)),t:'תמיכה',str:'בינונית'},
    {p:parseFloat((s[Math.floor(s.length*.75)]||s[0]||0).toFixed(2)),t:'התנגדות',str:'בינונית'},
    {p:parseFloat((h.length?h[Math.floor(h.length*.1)]:s[Math.floor(s.length*.9)]).toFixed(2)),t:'התנגדות',str:'חזקה'},
  ];
}
function signal(price,m9,m20,m150,m200,rv,zs){
  let sc=0,rs=[];
  if(m200){if(price>m200){sc++;rs.push('מעל MA200');}else{sc--;rs.push('מתחת MA200');}}
  if(m150){if(price>m150){sc++;rs.push('מעל MA150');}else{sc--;rs.push('מתחת MA150');}}
  if(m9&&m20){if(m9>m20){sc++;rs.push('MA9 מעל MA20');}else{sc--;rs.push('MA9 מתחת MA20');}}
  if(rv!==null){if(rv<35){sc+=2;rs.push('RSI נמוך ('+rv+')');}else if(rv>70){sc-=2;rs.push('RSI גבוה ('+rv+')');}else rs.push('RSI ניטרלי ('+rv+')');}
  if(sc>=2)return{c:'green',l:'פוטנציאל קנייה',rs};
  if(sc<=-1)return{c:'red',l:'זהירות — חולשה',rs};
  return{c:'yellow',l:'תמונה מעורבת',rs};
}
function calcFV(eps,pe,price,growth){
  if(!eps||eps<=0)return null;
  // מכפיל הוגן ≈ קצב צמיחת הרווחים (כלל PEG=1), מוגבל לטווח 12–45
  let fairPE;
  if(growth&&growth>0){
    fairPE=Math.max(12,Math.min(growth*100,45));
  }else{
    fairPE=Math.min(pe||20,25); // אין נתון צמיחה — נופלים למכפיל שמרני
  }
  const fv=parseFloat((eps*fairPE).toFixed(2));
  const diff=parseFloat(((price-fv)/fv*100).toFixed(1));
  let label,color;
  if(diff>20){label='יקרה מאוד';color='#f87171';}
  else if(diff>5){label='יקרה קצת';color='#fbbf24';}
  else if(diff<-20){label='זולה מאוד';color='#4ade80';}
  else if(diff<-5){label='זולה קצת';color='#4ade80';}
  else{label='שווי הוגן';color='#a78bfa';}
  return{fv,diff,label,color};
}
function calcGrade(price,m9,m20,m150,m200,rv,pe){
  let s=0;
  if(m200)price>m200?s+=2:s--;
  if(m150)price>m150?s+=2:s--;
  if(m9&&m20)m9>m20?s+=2:s--;
  if(rv!==null&&rv<35)s+=3;else if(rv!==null&&rv>70)s-=2;else s+=1;
  if(pe)pe<20?s+=2:pe>50?s--:null;
  if(s>=8)return{grade:'A',color:'#4ade80',label:'חזק מאוד'};
  if(s>=5)return{grade:'B',color:'#a3e635',label:'חיובי'};
  if(s>=2)return{grade:'C',color:'#fbbf24',label:'ניטרלי'};
  return{grade:'D',color:'#f87171',label:'חלש'};
}
function fmt(n){if(!n)return'—';if(n>1e12)return'$'+(n/1e12).toFixed(2)+'T';if(n>1e9)return'$'+(n/1e9).toFixed(2)+'B';if(n>1e6)return'$'+(n/1e6).toFixed(2)+'M';return'$'+n.toFixed(0);}

// ── AI — JavaScript חישב הכל, AI כותב רק את המגמה ──
async function getAI(data){
  const {ticker,price,rsiVal,m9,m20,sg,zs,bullPct,bearPct,pe,lows}=data;
  // חישוב JavaScript — לא AI!
  const priceNum=parseFloat(price);
  // סטופ = שפל אמיתי של 14 הימים האחרונים, מוגבל ל-12% מהמחיר
  const recentLows=(lows||[]).filter(v=>v!=null).slice(-14);
  let stop=recentLows.length?Math.min(...recentLows):priceNum*0.95;
  if(stop>=priceNum)stop=priceNum*0.97;
  if((priceNum-stop)/priceNum>0.12)stop=priceNum*0.88;
  stop=parseFloat(stop.toFixed(2));
  const risk=parseFloat((priceNum-stop).toFixed(2));
  const target=parseFloat((priceNum+risk*2).toFixed(2));
  const trend=m9&&m20&&m9>m20?'עולה':'יורד';
  const rsiTxt=rsiVal<35?'נמוך — אזור קנייה':rsiVal>70?'גבוה — אזור מכירה':'נייטרלי';
  const emoji=rsiVal<35?'📈':rsiVal>70?'📉':'⚠️';

  // AI — משפט אחד על המגמה, דרך הבקאנד (המפתח לא נמצא בצד-לקוח)
  let trendText='';
  try{
    const r=await fetch(API+'/ai',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ticker,trend,rsiTxt,bullPct:bullPct||'N/A',bearPct:bearPct||'N/A'})
    });
    const d=await r.json();
    trendText=(d.text||'').trim();
  }catch(e){}

  return 'מגמה: '+(trendText||trend)+'\nכניסה: $'+price+'\nסטופ: $'+stop+'\nיעד: $'+target+' (יחס 1:2)\nסיכום: '+sg.l+'\n'+emoji;
}

// ── SENTIMENT ──
async function getSentiment(ticker){
  try{
    const r=await fetch(API+'/sentiment/'+ticker);const d=await r.json();
    if(d.error)return null;
    const bull=d.bull_pct||0,bear=d.bear_pct||0,neutral=d.neutral_pct||0,total=d.votes?.total||0;
    document.getElementById('sentCard').innerHTML=
      '<div class="sentiment-header"><div class="sentiment-title">🐂 שורים / 🐻 דובים</div><div class="sentiment-analysts">'+total+' אנליסטים</div></div>'+
      '<div class="sentiment-bar-wrap"><div class="sentiment-bar-bull" style="width:'+bull+'%">'+(bull>10?bull+'%':'')+'</div><div class="sentiment-bar-neutral" style="width:'+neutral+'%">'+(neutral>10?neutral+'%':'')+'</div><div class="sentiment-bar-bear" style="width:'+bear+'%">'+(bear>10?bear+'%':'')+'</div></div>'+
      '<div class="sentiment-labels"><span class="sentiment-label-bull">🐂 '+bull+'% שורים</span><span class="sentiment-label-neutral">Hold '+neutral+'%</span><span class="sentiment-label-bear">'+bear+'% דובים 🐻</span></div>'+
      '<div class="sentiment-votes"><span class="vote-chip">💪 Strong Buy: '+(d.votes?.strong_buy||0)+'</span><span class="vote-chip">✅ Buy: '+(d.votes?.buy||0)+'</span><span class="vote-chip">⏸ Hold: '+(d.votes?.hold||0)+'</span><span class="vote-chip">⚠️ Sell: '+(d.votes?.sell||0)+'</span><span class="vote-chip">🚨 Strong Sell: '+(d.votes?.strong_sell||0)+'</span></div>'+
      (d.short_pct_float?'<div class="short-row"><span class="short-label">אחוז שורט</span><span class="short-val">'+d.short_pct_float+'%</span></div>':'');
    return d;
  }catch(e){document.getElementById('sentCard').style.display='none';return null;}
}

// ── AUTO PRICE UPDATE ──
async function updatePrice(){
  if(!currentTicker)return;
  try{
    const r=await fetch(API+'/price/'+currentTicker);const d=await r.json();
    if(d.error||d.price==null)return;
    const p=d.price;const prev=d.prev||p;
    const ch=((p-prev)/prev*100).toFixed(2);const up=parseFloat(ch)>=0;
    const pe=document.querySelector('.company-price-value');const ce=document.querySelector('.company-price-change');
    if(pe)pe.textContent='$'+p.toFixed(2);
    if(ce){ce.textContent=(up?'▲':'▼')+' '+Math.abs(ch)+'% היום';ce.className='company-price-change '+(up?'up':'down');}
  }catch(e){}
}

// ── ANALYZE ──
async function analyze(){
  const t=document.getElementById('ticker').value.trim().toUpperCase();
  if(!t)return;
  currentTicker=t;
  if(window.pi)clearInterval(window.pi);
  window.pi=setInterval(updatePrice,30000);
  if(pc){pc.destroy();pc=null;}if(rc){rc.destroy();rc=null;}
  document.getElementById('results').innerHTML='<div class="loading-state">טוען '+t+'...</div>';
  try{
    const [res,pres]=await Promise.all([fetch(API+'/stock/'+t),fetch(API+'/price/'+t)]);
    const json=await res.json();
    if(json.error)throw new Error(json.error);
    let live=null;try{live=await pres.json();}catch(e){}
    const d=json.closes,lb=json.labels,highs=json.highs||null,lows=json.lows||null;
    const m9v=ma(d,9),m20v=ma(d,20),m150v=ma(d,150),m200v=ma(d,200),rv=rsi(d);

    const price=(live&&live.price!=null)?live.price:histLast;

    const rv_=rv.filter(v=>v!==null).pop();
    const lm9=m9v.filter(v=>v!==null).pop(),lm20=m20v.filter(v=>v!==null).pop();
    const lm150=m150v.filter(v=>v!==null).pop(),lm200=m200v.filter(v=>v!==null).pop();
    const zs=zones(d,highs,lows);
    const sg=signal(price,lm9,lm20,lm150,lm200,rv_,zs);
    const gradeData=calcGrade(price,lm9,lm20,lm150,lm200,rv_,json.pe_ratio);
    const fvData=calcFV(json.eps,json.pe_ratio,price,json.earnings_growth);
    const gc='rgba(255,255,255,0.04)',tc='rgba(255,255,255,0.25)';

    document.getElementById('results').innerHTML=

      '</div>'+
      '<div class="company-header">'+
      '<div><div class="company-name">'+(json.name||t)+'</div><div class="company-ticker">'+t+(json.country?' · '+json.country:'')+'</div>'+
      '<div class="company-tags">'+(json.sector?'<span class="tag">'+json.sector+'</span>':'')+(json.employees?'<span class="tag">'+Number(json.employees).toLocaleString()+' עובדים</span>':'')+'</div></div>'+
      '<div><div class="company-price-value">$'+price.toFixed(2)+'</div><div class="company-price-change '+(isUp?'up':'down')+'">'+(isUp?'▲':'▼')+' '+Math.abs(ch)+'% היום</div></div>'+
      '</div>'+
      '<div class="fundamentals">'+
      '<div class="glass fund-card"><div class="fund-label">שווי שוק</div><div class="fund-value">'+fmt(json.market_cap)+'</div></div>'+
      '<div class="glass fund-card"><div class="fund-label">P/E</div><div class="fund-value">'+(json.pe_ratio?json.pe_ratio.toFixed(1):'—')+'</div></div>'+
      '<div class="glass fund-card"><div class="fund-label">EPS</div><div class="fund-value">'+(json.eps?'$'+json.eps.toFixed(2):'—')+'</div></div>'+
      '<div class="glass fund-card"><div class="fund-label">52W גבוה</div><div class="fund-value">'+(json.week_high?'$'+json.week_high.toFixed(2):'—')+'</div></div>'+
      '<div class="glass fund-card"><div class="fund-label">52W נמוך</div><div class="fund-value">'+(json.week_low?'$'+json.week_low.toFixed(2):'—')+'</div></div>'+
      '<div class="glass fund-card"><div class="fund-label">דיבידנד</div><div class="fund-value">'+(json.dividend_pct?json.dividend_pct.toFixed(2)+'%':'—')+'</div></div>'+
      '</div>'+
      // Grade + FV
      '<div style="display:grid;grid-template-columns:1fr'+(fvData?' 1fr':'')+';gap:12px;margin-bottom:1.5rem">'+
      '<div style="padding:1.25rem;border-radius:14px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.09);display:flex;align-items:center;gap:14px">'+

      '<div><div style="font-size:11px;color:rgba(255,255,255,0.3)">ציון בריאות</div><div style="font-size:15px;font-weight:600;color:'+gradeData.color+'">'+gradeData.label+'</div></div>'+
      '</div>'+

    pc=new Chart(document.getElementById('pc'),{type:'line',data:{labels:lb,datasets:[

      {label:'MA9',data:m9v,borderColor:'#3b82f6',borderWidth:1.2,pointRadius:0,tension:0.3,spanGaps:true},
